<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>מחשבון חלבון</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="חלבון" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14100D" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&family=Rubik:wght@700;800&display=swap" rel="stylesheet" />
<style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}body{background:#14100D;color:#F3EDE4;font-family:'Heebo',sans-serif;-webkit-font-smoothing:antialiased;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;
const store={get:k=>{try{return localStorage.getItem(k)}catch(e){return null}},set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}},};
const todayKey=(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;})();
const FIELDS=[
  {key:'calories',label:'קלוריות',unit:'',dec:0},
  {key:'protein',label:'חלבון',unit:"ג'",dec:1},
  {key:'fat',label:'שומן',unit:"ג'",dec:1},
  {key:'saturatedFat',label:'מתוכו רווי',unit:"ג'",dec:1},
  {key:'carbs',label:'פחמימות',unit:"ג'",dec:1},
  {key:'sugar',label:'מתוכו סוכר',unit:"ג'",dec:1},
  {key:'fiber',label:'סיבים',unit:"ג'",dec:1},
  {key:'sodium',label:'נתרן',unit:'מ"ג',dec:0},
  {key:'cholesterol',label:'כולסטרול',unit:'מ"ג',dec:0},
];
const EMPTY=FIELDS.reduce((a,f)=>({...a,[f.key]:''}),{});
const SEEDS=[{id:'seed-cottage9',seed:true,name:"קוטג' 9%",serving:100,per100:{calories:'128',protein:'10.5',fat:'9',saturatedFat:'5.85',carbs:'1.2',sugar:'1.2',fiber:'',sodium:'350',cholesterol:'27'}}];
const num=v=>{const n=parseFloat(v);return Number.isFinite(n)?n:0;};
const fmt=(v,dec=1)=>{const n=Number(v);if(!Number.isFinite(n))return '0';return(Math.round(n*(dec?10:1))/(dec?10:1)).toLocaleString('en-US',{maximumFractionDigits:dec});};

function App(){
  const [tab,setTab]=useState('today');
  const [per100,set100]=useState(EMPTY);
  const [pname,setPname]=useState('');
  const [grams,setGrams]=useState('');
  const [nw,setNW]=useState(null);
  const [today,setToday]=useState([]);
  const [goal,setGoal]=useState('150');
  const [saved,setSaved]=useState(SEEDS);
  const [flash,setFlash]=useState(null);
  const [saveErr,setSaveErr]=useState('');

  useEffect(()=>{
    const g=store.get('protein-goal');if(g)setGoal(g);
    const d=store.get(`daylog:${todayKey}`);if(d)try{setToday(JSON.parse(d))}catch(e){}
    let stored=[];const s=store.get('saved-foods');if(s)try{stored=JSON.parse(s)}catch(e){}
    let removed=[];const r=store.get('removed-seeds');if(r)try{removed=JSON.parse(r)}catch(e){}
    const ids=new Set(stored.map(f=>f.id));
    const merged=[...stored];
    SEEDS.forEach(seed=>{if(!ids.has(seed.id)&&!removed.includes(seed.id))merged.push(seed);});
    setSaved(merged);store.set('saved-foods',JSON.stringify(merged));
  },[]);

  const pd=items=>store.set(`daylog:${todayKey}`,JSON.stringify(items));
  const ps=list=>store.set('saved-foods',JSON.stringify(list));
  const sf=k=>v=>set100(p=>({...p,[k]:v}));
  const fac=num(grams)/100;
  const res=FIELDS.reduce((a,f)=>({...a,[f.key]:num(per100[f.key])*fac}),{});
  const hasData=num(grams)>0&&(num(per100.calories)>0||num(per100.protein)>0);
  const mk=(name,p,g)=>{const f=num(g)/100;return{id:Date.now()+Math.random(),name:name||'מנה',grams:num(g),calories:num(p.calories)*f,protein:num(p.protein)*f,fat:num(p.fat)*f,carbs:num(p.carbs)*f,sodium:num(p.sodium)*f};};
  const addDay=()=>{if(!hasData)return;const n=[...today,mk(pname,per100,grams)];setToday(n);pd(n);setTab('today');};
  const saveFd=()=>{setSaveErr('');if(!pname.trim()){setSaveErr('תן שם למאכל');return;}if(!(num(per100.calories)>0||num(per100.protein)>0)){setSaveErr('מלא לפחות קלוריות או חלבון');return;}const food={id:Date.now(),name:pname.trim(),per100:{...per100},serving:num(grams)||100};const n=[food,...saved];setSaved(n);ps(n);setTab('foods');};
  const qAdd=food=>{const n=[...today,mk(food.name,food.per100,food.serving)];setToday(n);pd(n);setFlash(food.id);setTimeout(()=>setFlash(null),800);};
  const loadEd=food=>{set100({...EMPTY,...food.per100});setPname(food.name);setGrams(String(food.serving));setNW(null);setTab('add');};
  const delSaved=id=>{const food=saved.find(f=>f.id===id);const n=saved.filter(f=>f.id!==id);setSaved(n);ps(n);if(food&&food.seed){let rem=[];const r=store.get('removed-seeds');if(r)try{rem=JSON.parse(r)}catch(e){}if(!rem.includes(id)){rem.push(id);store.set('removed-seeds',JSON.stringify(rem));}}};
  const remItem=id=>{const n=today.filter(i=>i.id!==id);setToday(n);pd(n);};
  const totals=today.reduce((a,i)=>({calories:a.calories+i.calories,protein:a.protein+i.protein,fat:a.fat+i.fat,carbs:a.carbs+i.carbs,sodium:a.sodium+i.sodium}),{calories:0,protein:0,fat:0,carbs:0,sodium:0});
  const gPct=num(goal)>0?Math.min(100,(totals.protein/num(goal))*100):0;

  const C={
    root:{direction:'rtl',background:'#14100D',color:'#F3EDE4',minHeight:'100vh',padding:'18px 13px calc(90px + env(safe-area-inset-bottom)) 13px',fontFamily:"'Heebo',sans-serif"},
    wrap:{maxWidth:520,margin:'0 auto'},
    card:{background:'#1C1714',border:'1px solid #2E251F',borderRadius:17,padding:15,marginBottom:13},
    ey:{fontSize:11,fontWeight:700,letterSpacing:1.4,color:'#A89A8C',marginBottom:12,display:'flex',alignItems:'center',gap:8},
    dot:{width:6,height:6,borderRadius:'50%',background:'#E2473D',display:'inline-block'},
    tbar:{background:'#191512',border:'1px solid #2E251F',borderRadius:14,padding:15,marginBottom:13},
    lp:{border:'2px dashed #E2473D',borderRadius:14,padding:'12px 11px 4px',background:'#191512'},
    bar:{height:9,background:'#2A211B',borderRadius:5,overflow:'hidden'},
    nav:{position:'fixed',bottom:0,left:0,right:0,background:'#19140F',borderTop:'1px solid #2E251F',display:'flex',padding:'8px 8px calc(8px + env(safe-area-inset-bottom))'},
  };

  return(
  <div style={C.root}>
  <div style={C.wrap}>
    <div style={{fontFamily:'Rubik',fontWeight:800,fontSize:25,letterSpacing:-.8}}>מחשבון <span style={{color:'#F0B73E'}}>חלבון</span> וקלוריות</div>
    <div style={{fontSize:12.5,color:'#A89A8C',marginTop:6,marginBottom:16}}>שמור מאכלים קבועים · עקוב אחרי החלבון היומי</div>

    {tab==='today'&&<>
      <div style={C.tbar}>
        <div style={{display:'flex',gap:18,alignItems:'baseline',marginBottom:12}}>
          <div style={{fontFamily:'Rubik',fontWeight:800,fontSize:34,color:'#F0B73E',lineHeight:1}}>{fmt(totals.protein,1)}<span style={{fontSize:14,fontWeight:600}}> ג׳ חלבון</span></div>
          <div style={{fontFamily:'Rubik',fontWeight:700,fontSize:19,color:'#E8DCCD'}}>{fmt(totals.calories,0)} <span style={{fontSize:12,color:'#9A8D7F',fontWeight:500}}>קל׳</span></div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:7,fontSize:12.5,color:'#9A8D7F',marginBottom:8}}>
          יעד חלבון:
          <input style={{width:50,background:'#14100D',border:'1px solid #3A2E26',color:'#F0B73E',fontFamily:'Rubik',fontWeight:700,textAlign:'center',borderRadius:6,padding:5,outline:'none',fontSize:13}} inputMode="numeric" value={goal} onChange={e=>{setGoal(e.target.value);store.set('protein-goal',e.target.value);}}/>
          ג׳ · {fmt(gPct,0)}%
        </div>
        <div style={C.bar}><div style={{height:'100%',background:'linear-gradient(90deg,#C8902B,#F0B73E)',borderRadius:5,width:gPct+'%',transition:'width .35s'}}></div></div>
      </div>

      {saved.length>0&&<div style={C.card}>
        <div style={C.ey}><span style={C.dot}></span>הוספה מהירה</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {saved.map(f=><div key={f.id} style={{background:flash===f.id?'#23351F':'#241D19',border:`1px solid ${flash===f.id?'#3C5733':'#3A2E26'}`,borderRadius:12,padding:'10px 13px',cursor:'pointer',minHeight:50,display:'flex',flexDirection:'column',gap:2,justifyContent:'center'}} onClick={()=>qAdd(f)}>
            <div style={{fontSize:13.5,fontWeight:600}}>{f.name}</div>
            <div style={{fontSize:11,color:'#9A8D7F'}}>{fmt(f.serving,0)} ג׳ · <b style={{color:'#F0B73E'}}>{fmt(num(f.per100.protein)*f.serving/100,1)} ג׳ חלבון</b></div>
          </div>)}
        </div>
      </div>}

      <div style={C.card}>
        <div style={C.ey}><span style={C.dot}></span>היום · {todayKey}</div>
        {today.length===0?<div style={{textAlign:'center',color:'#7E7367',fontSize:13,padding:'18px 8px',lineHeight:1.6}}>עוד לא הוספת מנות היום.<br/>לחץ על מאכל שמור למעלה, או עבור ל״הוספה״.</div>:<>
          {today.map(i=><div key={i.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,padding:12,background:'#211A16',border:'1px solid #2E251F',borderRadius:11,marginBottom:8}}>
            <div>
              <div style={{fontSize:14.5,fontWeight:500}}>{i.name}</div>
              <div style={{fontSize:12,color:'#8E8175',marginTop:3}}>{fmt(i.grams,0)} ג׳ · <b style={{color:'#F0B73E'}}>{fmt(i.protein,1)} ג׳ חלבון</b> · {fmt(i.calories,0)} קל׳</div>
            </div>
            <button style={{background:'none',border:'none',color:'#6E6356',fontSize:24,cursor:'pointer',padding:'4px 8px',borderRadius:8,minWidth:40,minHeight:40,lineHeight:1}} onClick={()=>remItem(i.id)}>×</button>
          </div>)}
          <div style={{textAlign:'center',marginTop:6}}><button style={{background:'none',border:'none',color:'#7E7367',fontSize:12.5,cursor:'pointer',textDecoration:'underline',padding:8}} onClick={()=>{setToday([]);pd([]);}}>נקה את היום</button></div>
        </>}
      </div>
    </>}

    {tab==='add'&&<>
      <div style={C.card}>
        <input style={{background:'#191512',border:'1px solid #322820',color:'#F3EDE4',fontFamily:'Heebo',fontSize:15,outline:'none',width:'100%',padding:'11px 12px',borderRadius:11,marginBottom:13,textAlign:'right'}} placeholder="שם המוצר" value={pname} onChange={e=>setPname(e.target.value)}/>
        <div style={C.lp}>
          <div style={{fontFamily:'Rubik',fontWeight:700,fontSize:12,color:'#E2473D',marginBottom:11,textAlign:'center'}}>סימון תזונתי ל-100 גרם</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {FIELDS.map(f=><div key={f.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6,background:'#211A16',border:'1px solid #322820',borderRadius:10,padding:'7px 9px'}}>
              <label style={{fontSize:12.5,color:'#CDBFB1',fontWeight:500,whiteSpace:'nowrap'}}>{f.label}</label>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <input style={{width:56,background:'#14100D',border:'1px solid #3A2E26',color:'#F3EDE4',fontFamily:'Rubik',fontWeight:600,fontSize:15,textAlign:'center',borderRadius:7,padding:'8px 3px',outline:'none'}} inputMode="decimal" value={per100[f.key]} placeholder="0" onChange={e=>sf(f.key)(e.target.value)}/>
                <span style={{fontSize:11,color:'#7E7367',minWidth:22}}>{f.unit}</span>
              </div>
            </div>)}
          </div>
        </div>
        <div style={{...C.ey,marginTop:17}}><span style={C.dot}></span>כמה אתה אוכל</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          {['100','150','200'].map(q=><button key={q} style={{background:grams===q?'#F0B73E':'#241D19',border:`1px solid ${grams===q?'#F0B73E':'#3A2E26'}`,color:grams===q?'#14100D':'#E8DCCD',fontFamily:'Heebo',fontWeight:grams===q?700:500,fontSize:13.5,padding:'11px 14px',borderRadius:11,cursor:'pointer',minHeight:42}} onClick={()=>setGrams(q)}>{q} ג׳</button>)}
          {nw&&<button style={{background:grams===String(nw)?'#F0B73E':'#241D19',border:`1px solid ${grams===String(nw)?'#F0B73E':'#3A2E26'}`,color:grams===String(nw)?'#14100D':'#E8DCCD',fontFamily:'Heebo',fontWeight:500,fontSize:13.5,padding:'11px 14px',borderRadius:11,cursor:'pointer',minHeight:42}} onClick={()=>setGrams(String(nw))}>חבילה ({nw} ג׳)</button>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:11,background:'#211A16',border:'1px solid #322820',borderRadius:11,padding:'11px 14px'}}>
          <input style={{flex:1,background:'none',border:'none',color:'#F3EDE4',fontFamily:'Rubik',fontWeight:700,fontSize:23,outline:'none',width:'100%'}} inputMode="decimal" placeholder="0" value={grams} onChange={e=>setGrams(e.target.value)}/>
          <span style={{color:'#A89A8C',fontSize:14,fontWeight:500}}>גרם</span>
        </div>
      </div>

      {hasData&&<div style={C.card}>
        <div style={C.ey}><span style={C.dot}></span>הסה״כ ל-{fmt(grams,0)} ג׳</div>
        <div style={{display:'flex',gap:11,marginBottom:11}}>
          <div style={{flex:1,borderRadius:15,padding:'15px 14px',background:'linear-gradient(150deg,#2A2110,#211A12)',border:'1px solid #4A3A18'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#F0B73E',marginBottom:5}}>חלבון</div>
            <div style={{fontFamily:'Rubik',fontWeight:800,fontSize:36,color:'#F0B73E',lineHeight:1,letterSpacing:-1}}>{fmt(res.protein,1)}<small style={{fontSize:14,fontWeight:600,marginRight:3}}>ג׳</small></div>
          </div>
          <div style={{flex:1,borderRadius:15,padding:'15px 14px',background:'#211613',border:'1px solid #4A2722'}}>
            <div style={{fontSize:12,fontWeight:600,color:'#E27C72',marginBottom:5}}>קלוריות</div>
            <div style={{fontFamily:'Rubik',fontWeight:800,fontSize:36,color:'#F3EDE4',lineHeight:1,letterSpacing:-1}}>{fmt(res.calories,0)}</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          {[{v:res.fat,l:"שומן ג'"},{v:res.carbs,l:"פחמ' ג'"},{v:res.fiber,l:"סיבים ג'"},{v:res.sugar,l:"סוכר ג'"},{v:res.sodium,l:'נתרן מ"ג',d:0},{v:res.cholesterol,l:'כולס׳ מ"ג',d:0}].map((m,i)=><div key={i} style={{background:'#211A16',border:'1px solid #2E251F',borderRadius:11,padding:'10px 6px',textAlign:'center'}}>
            <div style={{fontFamily:'Rubik',fontWeight:700,fontSize:16}}>{fmt(m.v,m.d!==undefined?m.d:1)}</div>
            <div style={{fontSize:10.5,color:'#9A8D7F',marginTop:3}}>{m.l}</div>
          </div>)}
        </div>
        <div style={{display:'flex',gap:9,marginTop:13}}>
          <button style={{flex:1,border:'none',fontFamily:'Rubik',fontWeight:700,fontSize:15,padding:14,borderRadius:12,cursor:'pointer',minHeight:50,background:'#23351F',borderWidth:1,borderStyle:'solid',borderColor:'#3C5733',color:'#A7E08A'}} onClick={addDay}>＋ הוסף ליום</button>
          <button style={{flex:1,border:'none',fontFamily:'Rubik',fontWeight:700,fontSize:15,padding:14,borderRadius:12,cursor:'pointer',minHeight:50,background:'#211A16',borderWidth:1,borderStyle:'solid',borderColor:'#3A2E26',color:'#E8DCCD'}} onClick={saveFd}>★ שמור כמאכל</button>
        </div>
        {saveErr&&<div style={{background:'#2A1715',border:'1px solid #5A2620',color:'#F0B6AE',fontSize:13,padding:'11px 13px',borderRadius:11,marginTop:12}}>{saveErr}</div>}
      </div>}
    </>}

    {tab==='foods'&&<div style={C.card}>
      <div style={C.ey}><span style={C.dot}></span>המאכלים שלי</div>
      {saved.length===0?<div style={{textAlign:'center',color:'#7E7367',fontSize:13,padding:'18px 8px',lineHeight:1.6}}>אין עדיין מאכלים שמורים.<br/>ב״הוספה״ לחץ ★ שמור כמאכל.</div>:saved.map(f=><div key={f.id} style={{background:'#211A16',border:'1px solid #2E251F',borderRadius:13,padding:13,marginBottom:9}}>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:15.5,fontWeight:700}}>{f.name}</div>
          <div style={{fontSize:12,color:'#8E8175',marginTop:3}}>{fmt(f.serving,0)} ג׳ · <b style={{color:'#F0B73E'}}>{fmt(num(f.per100.protein)*f.serving/100,1)} ג׳ חלבון</b> · {fmt(num(f.per100.calories)*f.serving/100,0)} קל׳</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button style={{flex:1,border:'none',fontFamily:'Heebo',fontWeight:600,fontSize:13,padding:10,borderRadius:10,cursor:'pointer',minHeight:42,background:'#23351F',borderWidth:1,borderStyle:'solid',borderColor:'#3C5733',color:'#A7E08A'}} onClick={()=>{qAdd(f);setTab('today');}}>＋ ליום</button>
          <button style={{flex:1,border:'none',fontFamily:'Heebo',fontWeight:600,fontSize:13,padding:10,borderRadius:10,cursor:'pointer',minHeight:42,background:'#211A16',borderWidth:1,borderStyle:'solid',borderColor:'#3A2E26',color:'#CDBFB1'}} onClick={()=>loadEd(f)}>ערוך כמות</button>
          <button style={{flex:'0 0 46px',border:'none',fontFamily:'Heebo',fontWeight:600,fontSize:13,padding:10,borderRadius:10,cursor:'pointer',minHeight:42,background:'#241715',borderWidth:1,borderStyle:'solid',borderColor:'#4A2620',color:'#E29089'}} onClick={()=>delSaved(f.id)}>🗑</button>
        </div>
      </div>)}
    </div>}
  </div>

  <div style={C.nav}>
    {[{id:'today',ic:'📊',lbl:'היום',b:today.length},{id:'add',ic:'＋',lbl:'הוספה',b:0},{id:'foods',ic:'★',lbl:'מאכלים',b:saved.length}].map(t=><button key={t.id} style={{flex:1,background:'none',border:'none',color:tab===t.id?'#F0B73E':'#8E8175',display:'flex',flexDirection:'column',alignItems:'center',gap:3,fontFamily:'Heebo',fontSize:11,fontWeight:600,padding:'8px 0',cursor:'pointer',borderRadius:10,minHeight:50}} onClick={()=>setTab(t.id)}>
      <span style={{fontSize:21,lineHeight:1}}>{t.ic}</span>
      <span>{t.lbl}{t.b>0&&<span style={{background:'#F0B73E',color:'#14100D',fontFamily:'Rubik',fontWeight:700,fontSize:10,borderRadius:9,padding:'1px 6px',marginRight:4}}>{t.b}</span>}</span>
    </button>)}
  </div>
  </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
