<script type="text/babel" data-presets='[["react",{"runtime":"classic"}]]'>
const { useState, useEffect, useRef } = React;

const todayKey = (() => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
})();

const FIELDS = [
  { key: "calories",     label: "קלוריות",       unit: "",     dec: 0 },
  { key: "protein",      label: "חלבון",          unit: "ג׳",   dec: 1 },
  { key: "fat",          label: "שומן",           unit: "ג׳",   dec: 1 },
  { key: "saturatedFat", label: "מתוכו רווי",     unit: "ג׳",   dec: 1 },
  { key: "carbs",        label: "פחמימות",        unit: "ג׳",   dec: 1 },
  { key: "sugar",        label: "מתוכו סוכר",     unit: "ג׳",   dec: 1 },
  { key: "fiber",        label: "סיבים",          unit: "ג׳",   dec: 1 },
  { key: "sodium",       label: "נתרן",           unit: 'מ"ג',  dec: 0 },
  { key: "cholesterol",  label: "כולסטרול",       unit: 'מ"ג',  dec: 0 },
];
const EMPTY = FIELDS.reduce((a, f) => ({ ...a, [f.key]: "" }), {});

const SEED_FOODS = [
  {
    id: "seed-cottage9", seed: true, name: "קוטג׳ 9%", serving: 100,
    per100: { calories: "128", protein: "10.5", fat: "9", saturatedFat: "5.85", carbs: "1.2", sugar: "1.2", fiber: "", sodium: "350", cholesterol: "27" },
  },
];

const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) ? n : 0; };
const fmt = (v, dec = 1) => {
  const n = Number(v);
  if (!Number.isFinite(n)) return "0";
  const r = Math.round(n * Math.pow(10, dec)) / Math.pow(10, dec);
  return r.toLocaleString("en-US", { maximumFractionDigits: dec });
};

const store = {
  get: (k) => { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch (e) {} },
};

async function preprocessImage(file) {
  try {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file);
    });
    const img = await new Promise((res, rej) => {
      const im = new window.Image(); im.onload = () => res(im); im.onerror = rej; im.src = dataUrl;
    });
    const maxDim = 1568;
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    c.getContext("2d").drawImage(img, 0, 0, w, h);
    const out = c.toDataURL("image/jpeg", 0.85);
    return { base64: out.split(",")[1], mediaType: "image/jpeg" };
  } catch (e) {
    const b64 = await new Promise((res, rej) => {
      const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = rej; r.readAsDataURL(file);
    });
    let mt = file.type || "image/jpeg";
    if (mt === "image/heic" || mt === "image/heif" || !mt) mt = "image/jpeg";
    return { base64: b64, mediaType: mt };
  }
}

function parseJson(text) {
  let clean = (text || "").replace(/```json|```/g, "").trim();
  const s = clean.indexOf("{"); const e = clean.lastIndexOf("}");
  if (s !== -1 && e !== -1) clean = clean.slice(s, e + 1);
  return JSON.parse(clean);
}

const EXTRACT_PROMPT = `קראת תווית מזון ישראלית (בעברית). חלץ את הערכים התזונתיים מעמודת "ל-100 גרם".
מיפוי: אנרגיה/קלוריות=calories, חלבונים=protein, סך השומנים=fat, חומצת שומן רוויות=saturatedFat, חומצת שומן טרנס=transFat, סך הפחמימות=carbs, סוכרים=sugar, סיבים תזונתיים=fiber, נתרן=sodium, כולסטרול=cholesterol.
החזר אך ורק אובייקט JSON תקין, ללא markdown וללא טקסט נוסף, עם המפתחות: calories, protein, fat, saturatedFat, transFat, carbs, sugar, fiber, sodium, cholesterol, productName, netWeightGrams.
כל ערכי המזון ל-100 גרם. sodium ו-cholesterol במ"ג, השאר בגרמים, calories בקק"ל.
"פחות מ-0.5" => 0.5. ערך שלא נמצא => null. productName = שם המוצר. netWeightGrams = משקל נטו בגרמים אם מצוין, אחרת null.`;

function MacroCalculator() {
  const [tab, setTab] = useState("today");
  const [per100, setPer100] = useState(EMPTY);
  const [productName, setProductName] = useState("");
  const [netWeight, setNetWeight] = useState(null);
  const [grams, setGrams] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [errDetail, setErrDetail] = useState("");
  const [saveErr, setSaveErr] = useState("");
  const [today, setToday] = useState([]);
  const [goal, setGoal] = useState("150");
  const [saved, setSaved] = useState(SEED_FOODS);
  const [flash, setFlash] = useState(null);
  const [apiKey, setApiKey] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [apiKeyInput, setApiKeyInput] = useState("");
  const fileRef = useRef(null);

  useEffect(() => {
    const g = store.get("protein-goal"); if (g) setGoal(g);
    const ak = store.get("anthropic-api-key"); if (ak) setApiKey(ak);
    const d = store.get(`daylog:${todayKey}`); if (d) try { setToday(JSON.parse(d)); } catch (e) {}
    let stored = [];
    const s = store.get("saved-foods"); if (s) try { stored = JSON.parse(s); } catch (e) {}
    let removed = [];
    const r = store.get("removed-seeds"); if (r) try { removed = JSON.parse(r); } catch (e) {}
    const ids = new Set(stored.map((f) => f.id));
    const merged = [...stored];
    SEED_FOODS.forEach((seed) => { if (!ids.has(seed.id) && !removed.includes(seed.id)) merged.push(seed); });
    setSaved(merged);
    store.set("saved-foods", JSON.stringify(merged));
  }, []);

  const persistDay    = (items) => store.set(`daylog:${todayKey}`, JSON.stringify(items));
  const persistSaved  = (list)  => store.set("saved-foods", JSON.stringify(list));
  const setField      = (k, v)  => setPer100((p) => ({ ...p, [k]: v }));

  function saveApiKey() {
    const key = apiKeyInput.trim();
    store.set("anthropic-api-key", key);
    setApiKey(key);
    setShowSettings(false);
  }

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (fileRef.current) fileRef.current.value = "";
    if (!file) return;
    setErr(""); setErrDetail(""); setLoading(true);
    try {
      const { base64, mediaType } = await preprocessImage(file);
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
            { type: "text", text: EXTRACT_PROMPT },
          ]}],
        }),
      });
      const raw = await res.text();
      let data = null; try { data = JSON.parse(raw); } catch (_) {}
      if (!res.ok) {
        const m = (data && data.error && data.error.message) || (raw ? raw.slice(0, 220) : "") || ("HTTP " + res.status);
        throw new Error("שרת " + res.status + ": " + m);
      }
      if (!data || !data.content) throw new Error((data && data.error && data.error.message) || "תגובה ריקה מהשרת");
      const text = data.content.filter((b) => b.type === "text").map((b) => b.text).join("\n");
      let parsed; try { parsed = parseJson(text); } catch (_) { throw new Error("התקבלה תשובה אך לא הצלחתי לפענח ממנה ערכים."); }
      const next = { ...EMPTY };
      FIELDS.forEach((f) => { if (parsed[f.key] !== null && parsed[f.key] !== undefined) next[f.key] = String(parsed[f.key]); });
      setPer100(next);
      if (parsed.productName) setProductName(parsed.productName);
      if (parsed.netWeightGrams) { setNetWeight(num(parsed.netWeightGrams)); setGrams(String(num(parsed.netWeightGrams))); }
    } catch (e2) {
      setErr("קריאת התווית נכשלה. אפשר להזין ידנית למטה.");
      setErrDetail(String(e2 && e2.message ? e2.message : e2));
    } finally { setLoading(false); }
  }

  const factor  = num(grams) / 100;
  const result  = FIELDS.reduce((a, f) => ({ ...a, [f.key]: num(per100[f.key]) * factor }), {});
  const hasData = num(grams) > 0 && (num(per100.calories) > 0 || num(per100.protein) > 0);

  function makeEntry(name, p100, g) {
    const fac = num(g) / 100;
    return { id: Date.now() + Math.random(), name: name || "מנה ללא שם", grams: num(g),
      calories: num(p100.calories) * fac, protein: num(p100.protein) * fac,
      fat: num(p100.fat) * fac, carbs: num(p100.carbs) * fac, sodium: num(p100.sodium) * fac };
  }

  function addToToday() {
    if (!hasData) return;
    const next = [...today, makeEntry(productName, per100, grams)];
    setToday(next); persistDay(next); setTab("today");
  }

  function saveFood() {
    setSaveErr("");
    if (!productName.trim()) { setSaveErr("תן שם למאכל כדי לשמור אותו"); return; }
    if (!(num(per100.calories) > 0 || num(per100.protein) > 0)) { setSaveErr("אין ערכים לשמור — מלא לפחות קלוריות או חלבון"); return; }
    const food = { id: Date.now(), name: productName.trim(), per100: { ...per100 }, serving: num(grams) || 100 };
    const next = [food, ...saved]; setSaved(next); persistSaved(next); setTab("foods");
  }

  function quickAddSaved(food) {
    const next = [...today, makeEntry(food.name, food.per100, food.serving)];
    setToday(next); persistDay(next);
    setFlash(food.id); setTimeout(() => setFlash(null), 900);
  }

  function loadSavedToEditor(food) {
    setPer100({ ...EMPTY, ...food.per100 }); setProductName(food.name);
    setGrams(String(food.serving)); setNetWeight(null); setTab("add");
  }

  function deleteSaved(id) {
    const food = saved.find((f) => f.id === id);
    const next = saved.filter((f) => f.id !== id); setSaved(next); persistSaved(next);
    if (food && food.seed) {
      let removed = []; const r = store.get("removed-seeds"); if (r) try { removed = JSON.parse(r); } catch (e) {}
      if (!removed.includes(id)) { removed.push(id); store.set("removed-seeds", JSON.stringify(removed)); }
    }
  }

  function removeItem(id) { const next = today.filter((i) => i.id !== id); setToday(next); persistDay(next); }
  function clearDay()     { setToday([]); persistDay([]); }

  const dayTotals = today.reduce((a, i) => ({
    calories: a.calories + i.calories, protein: a.protein + i.protein,
    fat: a.fat + i.fat, carbs: a.carbs + i.carbs, sodium: a.sodium + i.sodium,
  }), { calories: 0, protein: 0, fat: 0, carbs: 0, sodium: 0 });
  const goalPct = num(goal) > 0 ? Math.min(100, (dayTotals.protein / num(goal)) * 100) : 0;

  return (
    <div className="macro-root">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Rubik:wght@500;600;700;800&display=swap');

        .macro-root{direction:rtl;font-family:'Heebo',sans-serif;background:#14100D;color:#F3EDE4;min-height:100vh;
          padding:18px 13px calc(96px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased;}
        .wrap{max-width:520px;margin:0 auto;}
        .header{display:flex;justify-content:space-between;align-items:center;}
        .brand{font-family:'Rubik';font-weight:800;font-size:25px;line-height:1;letter-spacing:-.8px;}
        .brand b{color:#F0B73E;}
        .settings-btn{background:none;border:none;color:#7E7367;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;min-height:40px;}
        .settings-btn:active{color:#F0B73E;}
        .sub{font-size:12.5px;color:#A89A8C;margin-top:6px;margin-bottom:16px;}
        .card{background:#1C1714;border:1px solid #2E251F;border-radius:17px;padding:15px;margin-bottom:13px;}
        .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.4px;color:#A89A8C;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
        .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:#E2473D;}
        .upload{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;cursor:pointer;
          background:#F0B73E;color:#14100D;font-family:'Rubik';font-weight:700;font-size:16px;padding:16px;border-radius:13px;min-height:54px;}
        .upload:active{filter:brightness(.94);}
        .hint{font-size:12px;color:#7E7367;text-align:center;margin-top:9px;}
        .no-key{background:#191512;border:1px dashed #3A2E26;border-radius:12px;padding:14px;text-align:center;color:#7E7367;font-size:13px;line-height:1.6;}
        .no-key button{background:none;border:none;color:#F0B73E;cursor:pointer;font-family:'Heebo';font-size:13px;text-decoration:underline;margin-top:4px;}
        .err{background:#2A1715;border:1px solid #5A2620;color:#F0B6AE;font-size:13px;padding:11px 13px;border-radius:11px;margin-top:12px;line-height:1.5;}

        .pname:focus{border-color:#F0B73E;}

        .qa{background:#241D19;border:1px solid #3A2E26;border-radius:12px;padding:10px 13px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-height:50px;justify-content:center;transition:transform .12s,background .2s;}

        .qa .qm b{color:#F0B73E;}
        .sf{background:#211A16;border:1px solid #2E251F;border-radius:13px;padding:13px;margin-bottom:9px;}
        .sf-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
        .sf-nm{font-size:15.5px;font-weight:700;}
        .sf-meta{font-size:12px;color:#8E8175;margin-top:3px;}
        .sf-meta b{color:#F0B73E;}
        .sf-act{display:flex;gap:8px;}
        .sf-btn{flex:1;border:none;font-family:'Heebo';font-weight:600;font-size:13px;padding:10px;border-radius:10px;cursor:pointer;min-height:42px;}
        .sf-add{background:#23351F;border:1px solid #3C5733;color:#A7E08A;}
        .sf-edit{background:#211A16;border:1px solid #3A2E26;color:#CDBFB1;}
        .sf-del{background:#241715;border:1px solid #4A2620;color:#E29089;flex:0 0 46px;}
        .sf-btn:active{filter:brightness(1.15);}
        .tabbar{position:fixed;bottom:0;left:0;right:0;background:#19140F;border-top:1px solid #2E251F;display:flex;
          padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:50;}
        .tabbtn{flex:1;background:none;border:none;color:#8E8175;display:flex;flex-direction:column;align-items:center;gap:3px;
          font-family:'Heebo';font-size:11px;font-weight:600;padding:8px 0;cursor:pointer;border-radius:10px;min-height:50px;}
        .tabbtn .ic{font-size:21px;line-height:1;}
        .tabbtn.on{color:#F0B73E;}
        .badge{background:#F0B73E;color:#14100D;font-family:'Rubik';font-weight:700;font-size:10px;border-radius:9px;padding:1px 6px;margin-right:4px;}
        button:focus-visible,input:focus-visible{outline:2px solid #F0B73E;outline-offset:2px;}
        @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
        /* Settings modal */
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
        .modal{background:#1C1714;border:1px solid #2E251F;border-radius:20px;padding:22px;width:100%;max-width:380px;}
        .modal h3{font-family:'Rubik';font-weight:700;font-size:18px;margin-bottom:16px;color:#F3EDE4;}
        .modal-label{font-size:13px;color:#A89A8C;display:block;margin-bottom:6px;}
        .modal-input{width:100%;background:#191512;border:1px solid #3A2E26;color:#F3EDE4;font-family:'Heebo';font-size:14px;
          padding:11px 12px;border-radius:10px;outline:none;margin-bottom:10px;direction:ltr;}
        .modal-input:focus{border-color:#F0B73E;}
        .modal-hint{font-size:11.5px;color:#7E7367;line-height:1.6;margin-bottom:16px;}
        .modal-hint a{color:#F0B73E;}
        .modal-key-status{font-size:12px;color:#A7E08A;margin-bottom:12px;}
        .modal-actions{display:flex;gap:10px;}
        .modal-save{flex:1;background:#F0B73E;color:#14100D;border:none;font-family:'Rubik';font-weight:700;font-size:15px;padding:13px;border-radius:11px;cursor:pointer;}
        .modal-cancel{flex:1;background:#211A16;border:1px solid #3A2E26;color:#A89A8C;font-family:'Rubik';font-weight:600;font-size:15px;padding:13px;border-radius:11px;cursor:pointer;}
        .modal-clear{width:100%;background:transparent;border:1px solid #4A2620;color:#E29089;font-family:'Heebo';font-size:13px;padding:9px;border-radius:10px;cursor:pointer;margin-top:8px;}
      `}</style>

      {/* Settings modal */}
      {showSettings && (
        <div className="overlay" onClick={() => setShowSettings(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>⚙ הגדרות</h3>
            <label className="modal-label">מפתח API של Anthropic</label>
            <input
              className="modal-input"
              type="password"
              placeholder="sk-ant-api03-..."
              value={apiKeyInput}
              onChange={e => setApiKeyInput(e.target.value)}
            />
            {apiKey && <div className="modal-key-status">✓ מפתח שמור — סריקת תוויות פעילה</div>}
            <div className="modal-hint">
              המפתח נשמר רק במכשיר שלך ומשמש רק לסריקת תוויות מזון.<br />
              השג מפתח חינמי ב: <a>console.anthropic.com</a>
            </div>
            <div className="modal-actions">
              <button className="modal-cancel" onClick={() => setShowSettings(false)}>ביטול</button>
              <button className="modal-save" onClick={saveApiKey}>שמור</button>
            </div>
            {apiKey && (
              <button className="modal-clear" onClick={() => { store.set("anthropic-api-key",""); setApiKey(""); setApiKeyInput(""); setShowSettings(false); }}>
                מחק מפתח
              </button>
            )}
          </div>
        </div>
      )}

      <div className="wrap">
        <div className="header">
          <div className="brand">מחשבון <b>חלבון</b> וקלוריות</div>
          <button className="settings-btn" onClick={() => { setApiKeyInput(apiKey); setShowSettings(true); }} title="הגדרות">⚙</button>
        </div>
        <div className="sub">צלם תווית · שמור מאכלים קבועים · עקוב אחרי החלבון היומי</div>

        {/* ===== TODAY ===== */}
        {tab === "today" && (
          <>
            <div className="totalbar">
              <div className="tot-row">
                <div className="tot-p">{fmt(dayTotals.protein, 1)}<small> ג׳ חלבון</small></div>
                <div className="tot-c">{fmt(dayTotals.calories, 0)} <small>קל׳</small></div>
              </div>
              <div className="goalrow">
                יעד חלבון:
                <input inputMode="numeric" value={goal} onChange={(e) => { setGoal(e.target.value); store.set("protein-goal", e.target.value); }} />
                ג׳ · {fmt(goalPct, 0)}%
              </div>
              <div className="bar"><div className="bar-fill" style={{ width: goalPct + "%" }}></div></div>
            </div>

            {saved.length > 0 && (
              <div className="card">
                <div className="eyebrow"><span className="dot"></span>הוספה מהירה</div>
                <div className="qa-wrap">
                  {saved.map((f) => (
                    <div key={f.id} className={"qa" + (flash === f.id ? " flash" : "")} onClick={() => quickAddSaved(f)}>
                      <div className="qn">{f.name}</div>
                      <div className="qm">{fmt(f.serving, 0)} ג׳ · <b>{fmt(num(f.per100.protein) * f.serving / 100, 1)} ג׳ חלבון</b></div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="card">
              <div className="eyebrow"><span className="dot"></span>היום · {todayKey}</div>
              {today.length === 0 ? (
                <div className="empty">עוד לא הוספת מנות היום.<br />עבור ל"הוספה" כדי לצלם תווית, או הקש על מאכל שמור למעלה.</div>
              ) : (
                <>
                  {today.map((i) => (
                    <div className="item" key={i.id}>
                      <div>
                        <div className="nm">{i.name}</div>
                        <div className="meta">{fmt(i.grams, 0)} ג׳ · <b>{fmt(i.protein, 1)} ג׳ חלבון</b> · {fmt(i.calories, 0)} קל׳</div>
                      </div>
                      <button className="x" onClick={() => removeItem(i.id)} aria-label="הסר">×</button>
                    </div>
                  ))}
                  <div style={{ textAlign: "center", marginTop: 4 }}>
                    <button className="clear" onClick={clearDay}>נקה את היום</button>
                  </div>
                </>
              )}
            </div>
          </>
        )}

        {/* ===== ADD ===== */}
        {tab === "add" && (
          <>
            <div className="card">
              <div className="eyebrow"><span className="dot"></span>מקור הנתונים</div>
              {loading ? (
                <div className="loading"><span className="spin"></span>קורא את התווית…</div>
              ) : apiKey ? (
                <>
                  <button className="upload" onClick={() => fileRef.current && fileRef.current.click()}>📷 צלם או העלה תווית</button>
                  <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{ display: "none" }} />
                  <div className="hint">צלם מקרוב ובחדות את טבלת "ל-100 גרם", או מלא ידנית למטה</div>
                </>
              ) : (
                <div className="no-key">
                  כדי לצלם תוויות ולמלא ערכים אוטומטית, צריך מפתח API.<br />
                  <button onClick={() => { setApiKeyInput(""); setShowSettings(true); }}>הוסף מפתח API ←</button>
                </div>
              )}
              {err && (
                <div className="err">
                  {err}
                  {errDetail && <div className="errd">פרטים: {errDetail}</div>}
                </div>
              )}
            </div>

            <div className="card">
              <input className="pname" placeholder="שם המוצר (לדוגמה: קבב רומני)" value={productName} onChange={(e) => setProductName(e.target.value)} />
              <div className="label-panel">
                <div className="label-cap">סימון תזונתי ל-100 גרם</div>
                <div className="grid2">
                  {FIELDS.map((f) => (
                    <div className="frow" key={f.key}>
                      <label>{f.label}</label>
                      <div className="inp">
                        <input inputMode="decimal" value={per100[f.key]} placeholder="0" onChange={(e) => setField(f.key, e.target.value)} />
                        <span className="u">{f.unit}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="eyebrow" style={{ marginTop: 17 }}><span className="dot"></span>כמה אתה אוכל</div>
              <div className="qrow">
                <button className={"chip" + (grams === "100" ? " on" : "")} onClick={() => setGrams("100")}>100 ג׳</button>
                <button className={"chip" + (grams === "150" ? " on" : "")} onClick={() => setGrams("150")}>150 ג׳</button>
                <button className={"chip" + (grams === "200" ? " on" : "")} onClick={() => setGrams("200")}>200 ג׳</button>
                {netWeight && (
                  <button className={"chip" + (grams === String(netWeight) ? " on" : "")} onClick={() => setGrams(String(netWeight))}>חבילה ({netWeight} ג׳)</button>
                )}
              </div>
              <div className="gramwrap">
                <input inputMode="decimal" placeholder="0" value={grams} onChange={(e) => setGrams(e.target.value)} />
                <span>גרם</span>
              </div>
            </div>

            {hasData && (
              <div className="card">
                <div className="eyebrow"><span className="dot"></span>הסה״כ ל-{fmt(grams, 0)} ג׳</div>
                <div className="hero">
                  <div className="hero-box hero-protein">
                    <div className="hero-lbl">חלבון</div>
                    <div className="hero-val">{fmt(result.protein, 1)}<small>ג׳</small></div>
                  </div>
                  <div className="hero-box hero-cal">
                    <div className="hero-lbl">קלוריות</div>
                    <div className="hero-val">{fmt(result.calories, 0)}</div>
                  </div>
                </div>
                <div className="mini-grid">
                  <div className="mini"><div className="v">{fmt(result.fat, 1)}</div><div className="l">שומן ג׳</div></div>
                  <div className="mini"><div className="v">{fmt(result.carbs, 1)}</div><div className="l">פחמ׳ ג׳</div></div>
                  <div className="mini"><div className="v">{fmt(result.fiber, 1)}</div><div className="l">סיבים ג׳</div></div>
                  <div className="mini"><div className="v">{fmt(result.sugar, 1)}</div><div className="l">סוכר ג׳</div></div>
                  <div className="mini"><div className="v">{fmt(result.sodium, 0)}</div><div className="l">נתרן מ״ג</div></div>
                  <div className="mini"><div className="v">{fmt(result.cholesterol, 0)}</div><div className="l">כולס׳ מ״ג</div></div>
                </div>
                <div className="actions">
                  <button className="btn btn-add" onClick={addToToday}>＋ הוסף ליום</button>
                  <button className="btn btn-save" onClick={saveFood}>★ שמור כמאכל</button>
                </div>
                {saveErr && <div className="err">{saveErr}</div>}
              </div>
            )}
          </>
        )}

        {/* ===== SAVED FOODS ===== */}
        {tab === "foods" && (
          <div className="card">
            <div className="eyebrow"><span className="dot"></span>המאכלים שלי</div>
            {saved.length === 0 ? (
              <div className="empty">אין עדיין מאכלים שמורים.<br />ב"הוספה", אחרי שתזין ערכים, הקש על "★ שמור כמאכל" כדי שיופיע כאן לשימוש חוזר.</div>
            ) : (
              saved.map((f) => (
                <div className="sf" key={f.id}>
                  <div className="sf-top">
                    <div>
                      <div className="sf-nm">{f.name}</div>
                      <div className="sf-meta">מנה: {fmt(f.serving, 0)} ג׳ · <b>{fmt(num(f.per100.protein) * f.serving / 100, 1)} ג׳ חלבון</b> · {fmt(num(f.per100.calories) * f.serving / 100, 0)} קל׳</div>
                    </div>
                  </div>
                  <div className="sf-act">
                    <button className="sf-btn sf-add" onClick={() => { quickAddSaved(f); setTab("today"); }}>＋ ליום</button>
                    <button className="sf-btn sf-edit" onClick={() => loadSavedToEditor(f)}>ערוך כמות</button>
                    <button className="sf-btn sf-del" onClick={() => deleteSaved(f.id)} aria-label="מחק">🗑</button>
                  </div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      <div className="tabbar">
        <button className={"tabbtn" + (tab === "today" ? " on" : "")} onClick={() => setTab("today")}>
          <span className="ic">📊</span>היום{today.length > 0 && <span className="badge">{today.length}</span>}
        </button>
        <button className={"tabbtn" + (tab === "add" ? " on" : "")} onClick={() => setTab("add")}>
          <span className="ic">＋</span>הוספה
        </button>
        <button className={"tabbtn" + (tab === "foods" ? " on" : "")} onClick={() => setTab("foods")}>
          <span className="ic">★</span>מאכלים{saved.length > 0 && <span className="badge">{saved.length}</span>}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MacroCalculator />);
</script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});</script>
</body>
</html>
